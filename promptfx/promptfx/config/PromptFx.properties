# PromptFx Runtime Configuration
# This file is loaded from the working directory or the config/ subdirectory at startup.
# All properties are optional. Uncomment and edit as needed.

# Prompt include patterns: comma-separated globs matched against prompt id and/or category.
# Only prompts matching at least one pattern will be active. Leave blank (or omit) to include all.
# Example: prompt.include=text/**,code/**
#prompt.include=

# Prompt exclude patterns: comma-separated globs matched against prompt id and/or category.
# Prompts matching any pattern are deactivated. Exclude overrides include.
# Example: prompt.exclude=experimental/**
#prompt.exclude=

# Model include patterns: comma-separated globs matched against model id.
# Only models matching at least one pattern will be active. Leave blank (or omit) to include all.
# Example: model.include=gpt*,claude*
model.include=*gemini*

# Model exclude patterns: comma-separated globs matched against model id.
# Models matching any pattern are deactivated. Exclude overrides include.
# Example: model.exclude=*preview*
#model.exclude=

# Glob syntax: * matches any characters within a path segment (no /),
#              ** matches any characters including /,
#              ? matches exactly one character.
