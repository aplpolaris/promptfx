# Library of OpenAI Models
# See https://platform.openai.com/docs/models
---
audio: [ gpt-4o-transcribe, gpt-4o-mini-transcribe, whisper-1 ]
chat: [ gpt-3.5-turbo, gpt-4-turbo, gpt-4, o3-mini ]
completion: [ gpt-3.5-turbo-instruct, davinci-002, babbage-002 ]
embeddings: [ text-embedding-ada-002, text-embedding-3-large, text-embedding-3-small ]
image_generator: [ gpt-image-1.5, gpt-image-1, gpt-image-1-mini, dall-e-3, dall-e-2 ]
moderation: [ omni-moderation-latest ]
multimodal: [ gpt-4.1, gpt-4.1-mini, gpt-4.1-nano, gpt-4o, gpt-4o-mini, o4-mini, o3, o1 ]
responses: [ o1-pro, gpt-5.4, gpt-5.3-chat-latest, gpt-5.3-codex, gpt-5.2, gpt-5.2-codex, gpt-5.1, gpt-5.1-codex, gpt-5, gpt-5-codex, gpt-5-pro, gpt-5-mini, gpt-5-nano ]
tts: [ gpt-4o-mini-tts, tts-1, tts-1-hd ]
vision_language: [ ]

models:

  GPT-5:

    - id: gpt-5.4
      type: RESPONSES
      source: OpenAI
      metadata:
        name: GPT-5.4
        description: >
          Our most capable model for professional work
        lifecycle: PRODUCTION_ALIAS
      capabilities:
        inputs: [ text, image ]
        outputs: [ text ]
      params:
        totalTokenLimit: 1050000
        outputTokenLimit: 128000


    - id: gpt-5.3-chat-latest
      type: RESPONSES
      source: OpenAI
      metadata:
        name: GPT-5.3 Chat
        description: >
          GPT-5.3 Instant model used in ChatGPT
        lifecycle: PRODUCTION_ALIAS
      capabilities:
        inputs: [ text, image ]
        outputs: [ text ]
      params:
        totalTokenLimit: 128000
        outputTokenLimit: 16384


    - id: gpt-5.2
      type: RESPONSES
      source: OpenAI
      metadata:
        name: GPT-5.2
        description: >
          Previous frontier model for professional work with configurable reasoning effort
        lifecycle: PRODUCTION_ALIAS
      capabilities:
        inputs: [ text, image ]
        outputs: [ text ]
      params:
        totalTokenLimit: 400000
        outputTokenLimit: 128000


    - id: gpt-5.1
      type: RESPONSES
      source: OpenAI
      metadata:
        name: GPT-5.1
        description: >
          GPT-5.1 is our flagship model for coding and agentic tasks with configurable reasoning and non-reasoning effort.
        lifecycle: PRODUCTION_ALIAS
      capabilities:
        inputs: [ text, image ]
        outputs: [ text ]
      params:
        totalTokenLimit: 400000
        outputTokenLimit: 128000


    - id: gpt-5
      type: RESPONSES
      source: OpenAI
      metadata:
        name: GPT-5
        description: >
          GPT-5 is our previous model for coding, reasoning, and agentic tasks across domains. We recommend using the latest GPT-5.1. Learn more in our latest model guide.
        lifecycle: PRODUCTION_ALIAS
      capabilities:
        inputs: [ text, image ]
        outputs: [ text ]
      params:
        totalTokenLimit: 400000
        outputTokenLimit: 128000


    - id: gpt-5-mini
      type: RESPONSES
      source: OpenAI
      metadata:
        name: GPT-5 mini
        description: >
          GPT-5 mini is a faster, more cost-efficient version of GPT-5. It's great for well-defined tasks and precise prompts.
        lifecycle: PRODUCTION_ALIAS
      capabilities:
        inputs: [ text, image ]
        outputs: [ text ]
      params:
        totalTokenLimit: 400000
        outputTokenLimit: 128000


    - id: gpt-5-nano
      type: RESPONSES
      source: OpenAI
      metadata:
        name: GPT-5 nano
        description: >
          GPT-5 Nano is our fastest, cheapest version of GPT-5. It's great for summarization and classification tasks.
        lifecycle: PRODUCTION_ALIAS
      capabilities:
        inputs: [ text, image ]
        outputs: [ text ]
      params:
        totalTokenLimit: 400000
        outputTokenLimit: 128000


    - id: gpt-5-pro
      type: RESPONSES
      source: OpenAI
      metadata:
        name: GPT-5 pro ($$$$, Responses API only)
        description: >
          GPT-5 pro uses more compute to think harder and provide consistently better answers.
          GPT-5 pro is available in the Responses API only to enable support for multi-turn model interactions before responding to API requests, and other advanced API features in the future. Since GPT-5 pro is designed to tackle tough problems, some requests may take several minutes to finish.
        lifecycle: PRODUCTION_ALIAS
      capabilities:
        inputs: [ text, image ]
        outputs: [ text ]
      params:
        totalTokenLimit: 400000
        outputTokenLimit: 272000


  GPT-5 Codex:

    - id: gpt-5.3-codex
      type: RESPONSES
      source: OpenAI
      metadata:
        name: GPT-5.3 Codex
        description: >
          The most capable agentic coding model to date.
        lifecycle: PRODUCTION_ALIAS
      capabilities:
        inputs: [ text, image ]
        outputs: [ text ]
      params:
        totalTokenLimit: 400000
        outputTokenLimit: 128000


    - id: gpt-5.2-codex
      type: RESPONSES
      source: OpenAI
      metadata:
        name: GPT-5.2 Codex
        description: >
          Our most intelligent coding model optimized for long-horizon, agentic coding tasks.
        lifecycle: PRODUCTION_ALIAS
      capabilities:
        inputs: [ text, image ]
        outputs: [ text ]
      params:
        totalTokenLimit: 400000
        outputTokenLimit: 128000


    - id: gpt-5.1-codex
      type: RESPONSES
      source: OpenAI
      metadata:
        name: GPT-5.1 Codex
        description: >
          A version of GPT-5.1 optimized for agentic coding in Codex.
        lifecycle: PRODUCTION_ALIAS
      capabilities:
        inputs: [ text, image ]
        outputs: [ text ]
      params:
        totalTokenLimit: 400000
        outputTokenLimit: 128000


    - id: gpt-5-codex
      type: RESPONSES
      source: OpenAI
      metadata:
        name: GPT-5 Codex
        description: >
          A version of GPT-5 optimized for agentic coding in Codex
        lifecycle: PRODUCTION_ALIAS
      capabilities:
        inputs: [ text, image ]
        outputs: [ text ]
      params:
        totalTokenLimit: 400000
        outputTokenLimit: 128000


  GPT-4:

    - id: gpt-4.1
      type: RESPONSES
      source: OpenAI
      metadata:
        name: GPT-4.1
        description: >
          GPT-4.1 excels at instruction following and tool calling, with broad knowledge across domains. It features a 1M token context window, and low latency without a reasoning step.
        lifecycle: PRODUCTION_ALIAS
      capabilities:
        inputs: [ text, image ]
        outputs: [ text ]
      params:
        totalTokenLimit: 1047576
        outputTokenLimit: 32768


    - id: gpt-4.1-mini
      type: RESPONSES
      source: OpenAI
      metadata:
        name: GPT-4.1 mini
        description: >
          GPT-4.1 mini excels at instruction following and tool calling. It features a 1M token context window, and low latency without a reasoning step.
        lifecycle: PRODUCTION_ALIAS
      capabilities:
        inputs: [ text, image ]
        outputs: [ text ]
      params:
        totalTokenLimit: 1047576
        outputTokenLimit: 32768


    - id: gpt-4.1-nano
      type: RESPONSES
      source: OpenAI
      metadata:
        name: GPT-4.1 nano
        description: >
          GPT-4.1 nano excels at instruction following and tool calling. It features a 1M token context window, and low latency without a reasoning step.
        lifecycle: PRODUCTION_ALIAS
      capabilities:
        inputs: [ text, image ]
        outputs: [ text ]
      params:
        totalTokenLimit: 1047576
        outputTokenLimit: 32768


    - id: gpt-4o
      type: RESPONSES
      source: OpenAI
      metadata:
        name: GPT-4o
        description: >
          GPT-4o (“o” for “omni”) is our versatile, high-intelligence flagship model.
          It accepts both text and image inputs, and produces text outputs (including Structured Outputs).
        lifecycle: PRODUCTION_ALIAS
      capabilities:
        inputs: [ text, image ]
        outputs: [ text ]
      params:
        totalTokenLimit: 128000
        outputTokenLimit: 16384


    - id: gpt-4o-mini
      type: RESPONSES
      source: OpenAI
      metadata:
        name: GPT-4o Mini
        description: >
          GPT-4o mini (“o” for “omni”) is a fast, affordable small model for focused tasks.
          It accepts both text and image inputs, and produces text outputs (including Structured Outputs).
          It is ideal for fine-tuning, and model outputs from a larger model like GPT-4o can be distilled to GPT-4o-mini to produce similar results at lower cost and latency.
        lifecycle: PRODUCTION_ALIAS
      capabilities:
        inputs: [ text, image ]
        outputs: [ text ]
      params:
        totalTokenLimit: 128000
        outputTokenLimit: 16384


    - id: gpt-4-turbo
      type: RESPONSES
      source: OpenAI
      metadata:
        name: GPT-4-turbo
        description: >
          GPT-4 is an older version of a high-intelligence GPT model, usable in Chat Completions.
          The knowledge cutoff for the latest GPT-4 Turbo version is December, 2023.
        lifecycle: PRODUCTION_ALIAS
      capabilities:
        inputs: [ text, image ]
        outputs: [ text ]
      params:
        totalTokenLimit: 128000
        outputTokenLimit: 4096


    - id: gpt-4
      type: TEXT_CHAT
      source: OpenAI
      metadata:
        name: GPT-4
        description: >
          GPT-4 is an older version of a high-intelligence GPT model, usable in Chat Completions.
          The knowledge cutoff for the latest GPT-4 Turbo version is December, 2023.
        lifecycle: PRODUCTION_ALIAS
      capabilities:
        inputs: [ text ]
        outputs: [ text ]
      params:
        totalTokenLimit: 8192
        outputTokenLimit: 8192


  GPT-3.5:

    - id: gpt-3.5-turbo
      type: TEXT_CHAT
      source: OpenAI
      metadata:
        name: GPT-3.5 Turbo
        description: >
          GPT-3.5 with improved instruction following, JSON mode, reproducible outputs, parallel function calling, and more.
        lifecycle: PRODUCTION_ALIAS
      capabilities:
        inputs: [ text ]
        outputs: [ text ]
      params:
        totalTokenLimit: 16385
        outputTokenLimit: 4096


  GPT completions:

    - id: gpt-3.5-turbo-instruct
      type: TEXT_COMPLETION
      source: OpenAI
      metadata:
        name: GPT-3.5 Turbo Instruct
        description: >
          Similar capabilities as GPT-3 era models. Compatible with legacy Completions endpoint and not Chat Completions.
        lifecycle: LEGACY
      capabilities:
        inputs: [ text ]
        outputs: [ text ]
      params:
        totalTokenLimit: 4096
        outputTokenLimit: 4096


    - id: davinci-002
      type: TEXT_COMPLETION
      source: OpenAI
      metadata:
        name: Davinci 2
        lifecycle: LEGACY
      capabilities:
        inputs: [ text ]
        outputs: [ text ]
      params:
        totalTokenLimit: 16384
        outputTokenLimit: 4096


    - id: babbage-002
      type: TEXT_COMPLETION
      source: OpenAI
      metadata:
        name: Babbage 2
        lifecycle: LEGACY
      capabilities:
        inputs: [ text ]
        outputs: [ text ]
      params:
        totalTokenLimit: 16384
        outputTokenLimit: 4096


  Omni Reasoning Models:

    - id: o4-mini
      type: RESPONSES
      source: OpenAI
      metadata:
        name: o4-mini
        description: >
          o4-mini is our latest small o-series model. It's optimized for fast, effective reasoning with exceptionally efficient performance in coding and visual tasks. It's succeeded by GPT-5 mini.
        lifecycle: PRODUCTION_ALIAS
      capabilities:
        inputs: [ text, image ]
        outputs: [ text ]
      params:
        totalTokenLimit: 200000
        outputTokenLimit: 100000


    - id: o3
      type: RESPONSES
      source: OpenAI
      metadata:
        name: o3
        description: >
          o3 is a well-rounded and powerful model across domains. It sets a new standard for math, science, coding, and visual reasoning tasks. It also excels at technical writing and instruction-following. Use it to think through multi-step problems that involve analysis across text, code, and images.
          o3 is succeeded by GPT-5.
        lifecycle: PRODUCTION_ALIAS
      capabilities:
        inputs: [ text, image ]
        outputs: [ text ]
      params:
        totalTokenLimit: 200000
        outputTokenLimit: 100000


    - id: o3-mini
      type: TEXT_CHAT
      source: OpenAI
      metadata:
        name: GPT o3-mini Reasoning
        description: >
          o3-mini is our newest small reasoning model, providing high intelligence at the same cost and latency targets of o1-mini. o3-mini supports key developer features, like Structured Outputs, function calling, and Batch API.
        lifecycle: PRODUCTION_ALIAS
      capabilities:
        inputs: [ text ]
        outputs: [ text ]
      params:
        totalTokenLimit: 200000
        outputTokenLimit: 100000


    - id: o1
      type: RESPONSES
      source: OpenAI
      metadata:
        name: GPT o1 Reasoning
        description: >
          The o1 series of models are trained with reinforcement learning to perform complex reasoning.
          o1 models think before they answer, producing a long internal chain of thought before responding to the user.
          o1: reasoning model designed to solve hard problems across domains
        lifecycle: PRODUCTION_ALIAS
      capabilities:
        inputs: [ text, image ]
        outputs: [ text ]
      params:
        totalTokenLimit: 200000
        outputTokenLimit: 100000


    - id: o1-pro
      type: RESPONSES
      source: OpenAI
      metadata:
        name: o1-pro ($$$$$, Responses API only)
        description: >
          The o1 series of models are trained with reinforcement learning to think before they answer and perform complex reasoning. The o1-pro model uses more compute to think harder and provide consistently better answers.
          o1-pro is available in the Responses API only to enable support for multi-turn model interactions before responding to API requests, and other advanced API features in the future.
        lifecycle: PRODUCTION_ALIAS
      capabilities:
        inputs: [ text, image ]
        outputs: [ text ]
      params:
        totalTokenLimit: 200000
        outputTokenLimit: 100000


  Embeddings:

    - id: text-embedding-ada-002
      type: TEXT_EMBEDDING
      source: OpenAI
      metadata:
        name: Ada Text Embeddings
        description: Most capable 2nd generation embedding model, replacing 16 first generation models
        lifecycle: PRODUCTION
      capabilities:
        inputs: [ text ]
        outputs: [ embedding ]
      params:
        outputDimension: 1536


    - id: text-embedding-3-large
      type: TEXT_EMBEDDING
      source: OpenAI
      metadata:
        name: Ada Text Embeddings
        description: Most capable embedding model for both english and non-english tasks
        lifecycle: PRODUCTION
      capabilities:
        inputs: [ text ]
        outputs: [ embedding ]
      params:
        outputDimension: 3072


    - id: text-embedding-3-small
      type: TEXT_EMBEDDING
      source: OpenAI
      metadata:
        name: Ada Text Embeddings
        description: Increased performance over 2nd generation ada embedding model
        lifecycle: PRODUCTION
      capabilities:
        inputs: [ text ]
        outputs: [ embedding ]
      params:
        outputDimension: 1536


  Image Generation:

    - id: gpt-image-1.5
      type: IMAGE_GENERATOR
      source: OpenAI
      metadata:
        name: GPT Image 1.5
        description: >
          State-of-the-art image generation model.
        lifecycle: PRODUCTION
      capabilities:
        inputs: [ text, image ]
        outputs: [ text, image ]


    - id: gpt-image-1
      type: IMAGE_GENERATOR
      source: OpenAI
      metadata:
        name: GPT Image 1
        description: >
          GPT Image 1 is our new state-of-the-art image generation model. It is a natively multimodal language model that accepts both text and image inputs, and produces image outputs.
        lifecycle: PRODUCTION
      capabilities:
        inputs: [ text, image ]
        outputs: [ image ]


    - id: gpt-image-1-mini
      type: IMAGE_GENERATOR
      source: OpenAI
      metadata:
        name: GPT Image 1 mini
        description: >
          A cost-efficient version of GPT Image 1. It is a natively multimodal language model that accepts both text and image inputs, and produces image outputs.
        lifecycle: PRODUCTION
      capabilities:
        inputs: [ text, image ]
        outputs: [ image ]


    - id: dall-e-3
      type: IMAGE_GENERATOR
      source: OpenAI
      metadata:
        name: DALL-E 3
        description: >
          DALL·E is an AI system that creates realistic images and art from a natural language description. DALL·E 3 currently supports the ability, given a prompt, to create a new image with a specific size.
        lifecycle: PRODUCTION
      capabilities:
        inputs: [ text ]
        outputs: [ image ]


    - id: dall-e-2
      type: IMAGE_GENERATOR
      source: OpenAI
      metadata:
        name: DALL-E 2
        lifecycle: PRODUCTION
      capabilities:
        inputs: [ text ]
        outputs: [ image ]


  Moderation:

    - id: omni-moderation-latest
      type: MODERATION
      source: OpenAI
      metadata:
        name: Omni Moderation
        lifecycle: PRODUCTION
      capabilities:
        inputs: [ text, image ]
        outputs: [ moderation ]


  Speech:

    - id: gpt-4o-mini-tts
      type: TEXT_TO_SPEECH
      source: OpenAI
      metadata:
        name: GPT-4o mini TTS
        description: >
          GPT-4o mini TTS is a text-to-speech model built on GPT-4o mini, a fast and powerful language model. Use it to convert text to natural sounding spoken text. The maximum number of input tokens is 2000.
        lifecycle: PRODUCTION
      capabilities:
        inputs: [ text ]
        outputs: [ audio ]


    - id: tts-1
      type: TEXT_TO_SPEECH
      source: OpenAI
      metadata:
        name: TTS 1
        description: TTS 1 optimized for real-time text
        lifecycle: PRODUCTION
      capabilities:
        inputs: [ text ]
        outputs: [ audio ]


    - id: tts-1-hd
      type: TEXT_TO_SPEECH
      source: OpenAI
      metadata:
        name: TTS 1 HD
        description: TTS 1 optimized for higher quality audio
        lifecycle: PRODUCTION
      capabilities:
        inputs: [ text ]
        outputs: [ audio ]


    - id: gpt-4o-transcribe
      type: SPEECH_TO_TEXT
      source: OpenAI
      metadata:
        name: GPT-4o Transcribe
        description: >
          GPT-4o Transcribe is a speech-to-text model that uses GPT-4o to transcribe audio. It offers improvements to word error rate and better language recognition and accuracy compared to original Whisper models. Use it for more accurate transcripts.
        lifecycle: PRODUCTION
      capabilities:
        inputs: [ audio, text ]
        outputs: [ text ]


    - id: gpt-4o-mini-transcribe
      type: SPEECH_TO_TEXT
      source: OpenAI
      metadata:
        name: GPT-4o mini Transcribe
        description: >
          GPT-4o mini Transcribe is a speech-to-text model that uses GPT-4o mini to transcribe audio. It offers improvements to word error rate and better language recognition and accuracy compared to original Whisper models. Use it for more accurate transcripts.
        lifecycle: PRODUCTION
      capabilities:
        inputs: [ audio, text ]
        outputs: [ text ]


    - id: whisper-1
      type: SPEECH_TO_TEXT
      source: OpenAI
      metadata:
        name: Whisper v2-large
        description: Whisper speech recognition model, see https://github.com/openai/whisper and https://arxiv.org/abs/2212.04356
        lifecycle: PRODUCTION
      capabilities:
        inputs: [ audio ]
        outputs: [ text ]